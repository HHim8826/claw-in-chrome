name: Extension E2E

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "tests/helpers/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/e2e.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "tests/helpers/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

jobs:
  extension-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run extension E2E smoke test
        env:
          CLAW_E2E_ARTIFACT_DIR: artifacts/e2e
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extension-e2e-failure
          path: artifacts/e2e
          if-no-files-found: ignore

