name: Release Extension

"on":
  push:
    branches:
      - main
    paths:
      - src/manifest.json
  workflow_dispatch:
    inputs:
      min_supported_version:
        description: Optional minimum supported extension version (four numeric segments). Leave blank to avoid forcing an upgrade.
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fast validation
        run: npm run validate:fast

      - name: Verify release package manifest
        run: npm run check:release-package

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./src/manifest.json').version")"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Manifest version must use four numeric segments, got: ${VERSION}" >&2
            exit 1
          fi

          RAW_MANUAL_MIN_SUPPORTED="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.min_supported_version || '' }}"
          MANUAL_MIN_SUPPORTED="$(printf '%s' "${RAW_MANUAL_MIN_SUPPORTED}" | tr -d '\r' | xargs)"
          if [[ -n "${MANUAL_MIN_SUPPORTED}" ]] && [[ ! "${MANUAL_MIN_SUPPORTED}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "min_supported_version must use four numeric segments, got: ${MANUAL_MIN_SUPPORTED}" >&2
            exit 1
          fi

          BEFORE_SHA="${{ github.event.before }}"
          PREVIOUS_VERSION=""
          if [[ -n "${BEFORE_SHA}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "${BEFORE_SHA}:src/manifest.json" 2>/dev/null; then
              PREVIOUS_VERSION="$(git show "${BEFORE_SHA}:src/manifest.json" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => { const parsed = JSON.parse(data); process.stdout.write(String(parsed.version || '')); });")"
            fi
          fi

          if [[ -n "${PREVIOUS_VERSION}" ]] && [[ "${PREVIOUS_VERSION}" == "${VERSION}" ]]; then
            echo "Version did not change, skipping release."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          TAG="v${VERSION}"
          TRIGGER_SHA="${{ github.sha }}"

          ZIP_NAME="claw-in-chrome-v${VERSION}.zip"
          ZIP_PATH="${RUNNER_TEMP}/${ZIP_NAME}"
          NOTES_PATH="${RUNNER_TEMP}/release-notes.md"
          LATEST_JSON_PATH="${RUNNER_TEMP}/latest.json"

          export BEFORE_SHA TRIGGER_SHA TAG NOTES_PATH
          node <<'NODE'
          const fs = require("fs");
          const { execFileSync } = require("child_process");

          function git(args) {
            try {
              return execFileSync("git", args, {
                encoding: "utf8"
              });
            } catch (error) {
              return "";
            }
          }

          function normalizeMessage(value) {
            return String(value || "").replace(/\r/g, "").trim();
          }

          const before = String(process.env.BEFORE_SHA || "").trim();
          const trigger = String(process.env.TRIGGER_SHA || "").trim();
          const tag = String(process.env.TAG || "").trim();
          const notesPath = String(process.env.NOTES_PATH || "").trim();

          let shas = [];
          if (before && before !== "0000000000000000000000000000000000000000" && trigger) {
            shas = git(["rev-list", "--reverse", `${before}..${trigger}`])
              .split(/\r?\n/)
              .map(line => line.trim())
              .filter(Boolean);
          }

          if (shas.length === 0 && trigger) {
            shas = [trigger];
          }

          const sections = shas.map((sha) => {
            const message = normalizeMessage(git(["show", "-s", "--format=%B", sha]));
            if (!message) {
              return "";
            }
            const lines = message.split("\n");
            const title = String(lines.shift() || "").trim() || `Commit ${sha.slice(0, 7)}`;
            const body = lines.join("\n").trim();
            return body ? `### ${title}\n\n${body}` : `### ${title}`;
          }).filter(Boolean);

          const notes = sections.length > 0 ? sections.join("\n\n---\n\n") : `### Release ${tag}`;
          fs.writeFileSync(notesPath, notes + "\n");
          NODE

          export RELEASE_VERSION="${VERSION}"
          export RELEASE_NOTES_PATH="${NOTES_PATH}"
          export RELEASE_MIN_SUPPORTED_VERSION="${MANUAL_MIN_SUPPORTED}"
          export LATEST_JSON_PATH
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;
          const notesPath = String(process.env.RELEASE_NOTES_PATH || "").trim();
          const notes = notesPath ? String(fs.readFileSync(notesPath, "utf8")).trim() : "";
          const minSupportedVersion = String(process.env.RELEASE_MIN_SUPPORTED_VERSION || "").trim();
          const payload = {
            version,
            published_at: new Date().toISOString(),
            release_url: `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/tag/v${version}`,
            download_url: `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/v${version}/claw-in-chrome-v${version}.zip`,
            notes
          };
          if (minSupportedVersion) {
            payload.min_supported_version = minSupportedVersion;
          }
          fs.writeFileSync(process.env.LATEST_JSON_PATH, JSON.stringify(payload, null, 2) + "\n");
          NODE

          echo "should_release=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${ZIP_PATH}" >> "${GITHUB_OUTPUT}"
          echo "notes_path=${NOTES_PATH}" >> "${GITHUB_OUTPUT}"
          echo "latest_json_path=${LATEST_JSON_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Create release archive
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"

          PACKAGE_LIST_FILE=".github/release-package-items.txt"
          if [[ ! -f "${PACKAGE_LIST_FILE}" ]]; then
            echo "Missing package list: ${PACKAGE_LIST_FILE}" >&2
            exit 1
          fi
          mapfile -t PACKAGE_ITEMS < <(sed 's/\r$//' "${PACKAGE_LIST_FILE}" | grep -Ev '^[[:space:]]*(#|$)')
          if [[ ${#PACKAGE_ITEMS[@]} -eq 0 ]]; then
            echo "Package list is empty: ${PACKAGE_LIST_FILE}" >&2
            exit 1
          fi

          MISSING_ITEMS=()
          cd src
          for item in "${PACKAGE_ITEMS[@]}"; do
            if [[ ! -e "${item}" ]]; then
              MISSING_ITEMS+=("${item}")
            fi
          done

          if [[ ${#MISSING_ITEMS[@]} -gt 0 ]]; then
            printf 'Missing package item: %s\n' "${MISSING_ITEMS[@]}" >&2
            exit 1
          fi

          zip -r "${{ steps.meta.outputs.zip_path }}" "${PACKAGE_ITEMS[@]}"

      - name: Install Playwright Chromium
        if: steps.meta.outputs.should_release == 'true'
        run: npx playwright install --with-deps chromium

      - name: Extract release archive
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_ROOT="${RUNNER_TEMP}/release-extension"
          mkdir -p "${RELEASE_ROOT}"
          unzip -q "${{ steps.meta.outputs.zip_path }}" -d "${RELEASE_ROOT}"
          echo "release_root=${RELEASE_ROOT}" >> "${GITHUB_ENV}"

      - name: Smoke test extracted release
        if: steps.meta.outputs.should_release == 'true'
        env:
          CLAW_EXTENSION_ROOT: ${{ env.release_root }}
          CLAW_E2E_ARTIFACT_DIR: ${{ runner.temp }}/release-e2e-artifacts
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload release smoke failure artifacts
        if: failure() && steps.meta.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-failure
          path: ${{ runner.temp }}/release-e2e-artifacts
          if-no-files-found: ignore

      - name: Publish GitHub Release
        if: steps.meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Claw in Chrome v${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes_path }}
          files: |
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.latest_json_path }}
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
